<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="stylesheet" href="styles.css" />
		<title>My Postcard</title>
	</head>
	<body>
		<div class="postcard">
			<div class="postcard-header">
				<h1>My Postcard</h1>
				<img
					src="https://raw.githubusercontent.com/breatheco-de/exercise-postcard/e63a7916530cc850bd92aa1c2e19191837fb5c80/.learn/assets/4geeks.png"
				/>
			</div>
			<div class="postcard-body">
				<div class="body-left">
					<p>Look how awesome! This is a postcard that I created using HTML5 ans CSS during my 4Geeks Academy Course!</p>
				</div>
				<div class="body-right">
					<input type="text" placeholder="Some Name" />
					<input type="email" placeholder="Some Email" />
					<textarea placeholder="Some comment"></textarea>
				</div>
			</div>
			<div class="postcard-footer">
				<button>send my postcard</button>
			</div>
		</div>
	</body>
</html>
